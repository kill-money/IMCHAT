name: CI — Admin Web

on:
  push:
    branches: [main, develop]
    paths:
      - 'openim-admin-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'openim-admin-web/**'

defaults:
  run:
    working-directory: openim-admin-web

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openim-admin-web/package-lock.json
      - run: npm ci
      - name: Biome Lint
        run: npx @biomejs/biome lint ./src
      - name: TypeScript Check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: openim-admin-web/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests --ci
