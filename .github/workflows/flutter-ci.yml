name: Flutter CI

on:
  push:
    paths:
      - 'openim_flutter_app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'openim_flutter_app/**'
      - '.github/workflows/flutter-ci.yml'

defaults:
  run:
    working-directory: openim_flutter_app

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: openim_flutter_app/coverage/lcov.info
          retention-days: 7
