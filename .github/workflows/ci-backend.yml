name: CI — Backend (openim-chat)

on:
  push:
    branches: [main, develop]
    paths:
      - 'openim-chat/**'
  pull_request:
    branches: [main]
    paths:
      - 'openim-chat/**'

defaults:
  run:
    working-directory: openim-chat

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: openim-chat/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: openim-chat

  test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: openim-chat/go.sum
      - run: go test ./... -race -count=1 -timeout 300s
        env:
          MONGO_URI: mongodb://localhost:27017
          REDIS_ADDR: localhost:6379

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t openim-chat-local:ci .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: openim-chat/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
