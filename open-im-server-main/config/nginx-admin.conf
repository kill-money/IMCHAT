server {
    listen 80;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml application/wasm;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    default_type application/wasm;

    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;

    # Admin API proxy (/complete_admin -> admin-api :10009)
    location /complete_admin/ {
        proxy_pass http://host.docker.internal:10009/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Chat API proxy (/chat -> chat-api :10008)
    location /chat/ {
        proxy_pass http://host.docker.internal:10008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # IM API proxy (/api -> openim-server :10002)
    location /api/ {
        proxy_pass http://host.docker.internal:10002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri /index.html;
    }
}
