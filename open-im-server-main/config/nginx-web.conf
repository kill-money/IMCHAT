server {
    listen 80;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 9;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml application/wasm;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    default_type application/wasm;

    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;

    # Chat API proxy (/chat -> chat-api :10008)
    location /chat/ {
        proxy_pass http://host.docker.internal:10008/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # IM API proxy (/api -> openim-server :10002)
    location /api/ {
        proxy_pass http://host.docker.internal:10002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy
    location /msg_gateway {
        proxy_pass http://host.docker.internal:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri /index.html;
    }
}
